name: Playbook

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deterministic-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Validate roadmap contract
        run: npm run validate:roadmap

      - name: Build and test
        run: npm run build && npm test

      - name: Validate deterministic delivery linkage
        run: npm run validate:delivery
        continue-on-error: true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: Verify JSON contract
        run: node dist/cli.js verify --json
