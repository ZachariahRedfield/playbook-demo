name: Playbook

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Playbook verify in CI mode
        run: npx --yes @zachariahredfield/playbook@latest verify --ci

      - name: Run Playbook analyze in CI mode
        run: npx --yes @zachariahredfield/playbook@latest analyze --ci

      - name: Generate Playbook JSON report
        run: npx --yes @zachariahredfield/playbook@latest analyze --json > playbook-report.json

      - name: Validate package tarball contains CLI bin target
        run: npm run verify:pack-bin

      - name: Upload Playbook report artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-report
          path: playbook-report.json
