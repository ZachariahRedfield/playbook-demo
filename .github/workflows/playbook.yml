name: Playbook

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clear npm auth for public GitHub install
        run: |
          rm -f ~/.npmrc
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Install Playbook CLI from GitHub
        run: npm i --no-save github:ZachariahRedfield/playbook#main

      - name: Playbook verify in CI mode
        run: npx playbook verify --ci

      - name: Run Playbook analyze in CI mode
        run: npx playbook analyze --ci

      - name: Generate Playbook JSON report
        run: npx playbook analyze --json > playbook-report.json

      - name: Validate package tarball contains CLI bin target
        run: npm run verify:pack-bin

      - name: Upload Playbook report artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-report
          path: playbook-report.json
